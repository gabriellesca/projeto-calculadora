<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="calculadora">

    <div class="display-area">
      <div class="expressao" id="expressao">&nbsp;</div>
      <div class="display" id="display">0</div>
    </div>

    <div class="botoes">
      <button class="btn-funcao" onclick="limpar()">C</button>
      <button class="btn-funcao" onclick="apagar()">⌫</button>
      <button class="btn-funcao" onclick="adicionar('%')">%</button>
      <button class="btn-operador" onclick="adicionar('/')">÷</button>

      <button class="btn-numero" onclick="adicionar('7')">7</button>
      <button class="btn-numero" onclick="adicionar('8')">8</button>
      <button class="btn-numero" onclick="adicionar('9')">9</button>
      <button class="btn-operador" onclick="adicionar('*')">×</button>

      <button class="btn-numero" onclick="adicionar('4')">4</button>
      <button class="btn-numero" onclick="adicionar('5')">5</button>
      <button class="btn-numero" onclick="adicionar('6')">6</button>
      <button class="btn-operador" onclick="adicionar('-')">−</button>

      <button class="btn-numero" onclick="adicionar('1')">1</button>
      <button class="btn-numero" onclick="adicionar('2')">2</button>
      <button class="btn-numero" onclick="adicionar('3')">3</button>
      <button class="btn-operador" onclick="adicionar('+')">+</button>

      <button class="btn-numero zero" onclick="adicionar('0')">0</button>
      <button class="btn-numero" onclick="adicionar('.')">.</button>
      <button class="btn-igual" onclick="calcular()">=</button>
    </div>

  </div>
  <script src="script.js"></script>
</body>
</html>
